name: Main CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.14'
  APP_NAME: 'git-learning'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --verbose --html=test-report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: always()                              # upload even if tests fail
        with:
          name: test-report
          path: test-report.html
          retention-days: 30                      # keep for 30 days

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      BUILD_DIR: 'dist'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build app
        run: |
          echo "Building $APP_NAME..."
          mkdir -p $BUILD_DIR
          cp app.py $BUILD_DIR/
          echo "1.0.${{ github.run_number }}" > $BUILD_DIR/version.txt
          echo "Build complete. Files in $BUILD_DIR/:"
          ls $BUILD_DIR/

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: $BUILD_DIR/
          retention-days: 7                       # keep builds for 7 days

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging # auto deploys, no approval needed
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: build-output
          path: $BUILD_DIR/

      - name: Verify build files
        run: |
          echo "Files received from build job:"
          ls $BUILD_DIR/
          echo "Version being deployed:"
          cat $BUILD_DIR/version.txt

      - name: Deploy to staging
        run: |
          echo "Deploying $APP_NAME to version $(cat $BUILD_DIR/version.txt)..."
          echo "API key is set: ${{ secrets.API_KEY != '' }}"
          echo "Deploy URL: $DEPLOY_URL"
          echo "Deployment to staging complete!"
        env:
          API_KEY: ${{ secrets.API_KEY }}
          APP_ENV: ${{ vars.APP_ENV }}
          DEPLOY_URL: ${{secrets.DEPLOY_URL}} #uses staging secret

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production # pauses here, waits for your approval
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: build-output
          path: $BUILD_DIR/

      - name: Deploy to production
        run: |
          echo "Deploying $APP_NAME to version $(cat $BUILD_DIR/version.txt)..."
          echo "API key is set: ${{ secrets.API_KEY != '' }}"
          echo "Deploy URL: $DEPLOY_URL"
          echo "Deployment to production complete!"
        env:
          API_KEY: ${{ secrets.API_KEY }}
          APP_ENV: ${{ vars.APP_ENV }}
          DEPLOY_URL: ${{secrets.DEPLOY_URL}} # uses production secret