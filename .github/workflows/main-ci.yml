name: Main CI

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual triggering of the workflow
env:
  PYTHON_VERSION: '3.14'  # set a global environment variable for Python version
  APP_NAME: 'git-learning'  # set a global environment variable for the application name
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.PYTHON_VERSION}}  # use the global environment variable for Python version 

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --verbose

  build:
    runs-on: ubuntu-latest
    needs: test  
    env:
      BUILD_DIR: 'dist'
                            # only runs if test passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build app
        run: |
          echo "Building $APP_NAME..."
          mkdir -p $BUILD_DIR
          cp app.py $BUILD_DIR/
          echo "Build complete. Files in $BUILD_DIR/:"
          ls $BUILD_DIR/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build                       # only runs if build passes
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying $APP_NAME to $APP_ENV environment..."
          echo "API Keys is set: ${{secrets.API_KEY !=''}}"
          echo "Deployment complete!"
        env:
          APP_ENV: ${{ vars.APP_ENV }} # from GitHub Variables
          API_KEY: ${{ secrets.API_KEY }} # from GitHub Secrets