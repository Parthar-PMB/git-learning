name: Main CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.14'
  APP_NAME: 'git-learning'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip                                        # where pip stores downloads
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-                                   # fallback if exact key misses

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --verbose

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      BUILD_DIR: 'dist'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build app
        run: |
          echo "Building $APP_NAME..."
          mkdir -p $BUILD_DIR
          cp app.py $BUILD_DIR/
          echo "Build complete. Files in $BUILD_DIR/:"
          ls $BUILD_DIR/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying $APP_NAME to $APP_ENV environment..."
          echo "API key is set: ${{ secrets.API_KEY != '' }}"
          echo "Deployment complete!"
        env:
          API_KEY: ${{ secrets.API_KEY }}
          APP_ENV: ${{ vars.APP_ENV }}